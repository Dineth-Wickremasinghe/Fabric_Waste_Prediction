<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabric Waste Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, #1e3a5f, #2e86c1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card-header { border-radius: 16px 16px 0 0 !important; font-weight: 600; }
        .prediction-result {
            background: linear-gradient(135deg, #1e3a5f, #2e86c1);
            color: white; border-radius: 16px;
            padding: 30px; text-align: center; margin-bottom: 24px;
        }
        .prediction-result h2 { font-size: 3rem; font-weight: 700; margin: 0; }
        .btn-save {
            background: #28a745; color: white; border: none;
            padding: 6px 14px; border-radius: 6px; font-weight: 600;
        }
        .btn-save:hover { opacity: 0.9; }
        .table thead { background-color: #1e3a5f; color: white; }
        .badge-result {
            background-color: #d4edda; color: #155724;
            padding: 4px 10px; border-radius: 20px; font-weight: 600;
        }
        input.actual-input { width: 100px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3 mb-4">
    <span class="navbar-brand fs-4 fw-bold">🧵 Fabric Waste Prediction System</span>
</nav>

<div class="container pb-5">

    <!-- Result banner -->
    <div th:if="${prediction != null}" class="prediction-result">
        <p>Predicted Fabric Wastage</p>
        <h2 th:text="${#numbers.formatDecimal(prediction, 1, 4)} + '%'">--</h2>
        <p class="mt-2">✓ Saved to database</p>
    </div>
    <div class="prediction-result" th:if="${r2Score != null}">
        <p>R² Score</p>
        <h2 th:text="${#numbers.formatDecimal(r2Score, 1, 4)}">--</h2>
    </div>

    <div class="row g-4">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">📊 Prediction History</h5>
                    <span class="badge bg-secondary"
                          th:text="${history != null ? #lists.size(history) : 0} + ' records'">0 records</span>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card p-3 text-center">
                            <h6>R² Score</h6>
                            <div th:if="${enoughDataR2}">
                                <h3 th:text="${#numbers.formatDecimal(r2Score, 1, 4)}"></h3>
                            </div>
                            <div th:unless="${enoughDataR2}" class="text-muted">
                                Waiting for enough data...
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card p-3 text-center">
                            <h6>MAE</h6>
                            <div th:if="${enoughDataMAE}">
                                <h3 th:text="${#numbers.formatDecimal(maeScore, 1, 4)}"></h3>
                            </div>
                            <div th:unless="${enoughDataMAE}" class="text-muted">
                                Waiting for enough data...
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Input Features</th>
                                <th>Predicted</th>
                                <th>Actual</th>
                                <th>Date & Time</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(history)}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    No predictions yet.
                                </td>
                            </tr>

                            <tr th:each="record : ${history}">
                                <td th:text="${record.id}"></td>

                                <td>
                                    <small class="text-muted"
                                           th:text="${record.inputFeatures}"></small>
                                </td>

                                <td>
                                    <span class="badge-result"
                                          th:text="${#numbers.formatDecimal(record.predictionResult, 1, 4)} + '%'">
                                    </span>
                                </td>

                                <!-- Editable actual value -->
                                <td>
                                    <input type="number"
                                           step="0.01"
                                           class="form-control actual-input"
                                           th:value="${record.actualResult}"
                                           th:id="'actual-' + ${record.id}"
                                           placeholder="Enter">
                                </td>

                                <td>
                                    <small th:text="${#temporals.format(record.createdAt, 'dd MMM yyyy, HH:mm')}"></small>
                                </td>

                                <td>
                                    <button class="btn-save"
                                            th:onclick="'updateActual(' + ${record.id} + ')'">
                                        Save
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateActual(id) {
        const value = document.getElementById("actual-" + id).value;

        if (!value) {
            alert("Please enter an actual value");
            return;
        }

        fetch("/monitoring/" + id + "/actual", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ actualResult: parseFloat(value) })
        })
            .then(res => {
                if (res.ok) {
                    alert("Actual value saved!");
                    location.reload(); // reload to refresh metrics
                } else {
                    alert("Error saving value");
                }
            });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
```
