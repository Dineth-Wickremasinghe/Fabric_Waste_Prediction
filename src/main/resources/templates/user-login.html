<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fabric Wastage Prediction System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            margin: -48px -40px 32px -40px;
            padding: 28px 40px;
            border-radius: 16px 16px 0 0;
            text-align: center;
        }

        .header h1 {
            color: white;
            font-size: 20px;
            font-weight: 700;
            line-height: 1.4;
        }

        .user-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus { border-color: #2ecc71; }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .btn-login:hover { opacity: 0.9; }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #27ae60;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-back:hover { text-decoration: underline; }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .hint {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #aaa;
        }

        .hint a {
            color: #1976d2;
            text-decoration: none;
            font-weight: 500;
        }

        .hint a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="header">
        <h1>Fabric Wastage Prediction System</h1>
        <span class="user-badge">User Login</span>
    </div>

    <div th:if="${error}"   class="error-msg"   th:text="${error}"></div>
    <div th:if="${success}" class="success-msg" th:text="${success}"></div>

    <form th:action="@{/user/login}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required />
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-login">Login</button>
    </form>

    <a href="/" class="btn-back">← Back to Home</a>

    <div class="hint">Admin? <a href="/admin/login">Login here</a></div>
</div>
</body>
</html>
