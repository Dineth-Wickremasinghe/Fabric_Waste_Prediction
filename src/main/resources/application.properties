spring.application.name=Fabric_Waste_Prediction
spring.datasource.username=postgres
spring.datasource.password=zam123
spring.datasource.driver-class-name=org.postgresql.Driver

# Optional JPA and Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.example.fabric_waste_prediction=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Sustainability Calculation Factors
sustainability.factors.co2-per-kg-waste=2.5
sustainability.factors.water-per-kg-waste=150
sustainability.factors.energy-per-kg-waste=45
sustainability.factors.cost-per-kg-fabric=12.5
sustainability.factors.landfill-per-kg-waste=0.8

# Currency conversion (USD to LKR)
sustainability.currency.usd-to-lkr=300
# Use an appropriate dialect based on your PostgreSQL version
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
