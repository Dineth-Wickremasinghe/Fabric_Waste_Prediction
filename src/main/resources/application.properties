spring.application.name=Fabric_Waste_Prediction
spring.datasource.url=jdbc:postgresql://localhost:5432/Fabric AI
spring.datasource.username=postgres
spring.datasource.password= password

# Optional JPA and Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Use an appropriate dialect based on your PostgreSQL version
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
