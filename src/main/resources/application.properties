spring.application.name=Fabric_Waste_Prediction
spring.datasource.url=jdbc:postgresql://localhost:5432/Fabric_AI
spring.datasource.username=postgres
spring.datasource.password=zam123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.example.fabric_waste_prediction=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== SUSTAINABILITY CALCULATION FACTORS ====================
sustainability.factors.co2-per-kg-waste=2.5
sustainability.factors.water-per-kg-waste=150
sustainability.factors.energy-per-kg-waste=45
sustainability.factors.cost-per-kg-fabric=12.5
sustainability.factors.landfill-per-kg-waste=0.8

# Currency conversion (USD to LKR)
sustainability.currency.usd-to-lkr=300

# ==================== ENHANCED SUSTAINABILITY FACTORS (NEW) ====================

# Waste Management Factors
sustainability.waste.recycling-efficiency-bonus=1.2
sustainability.waste.landfill-penalty=0.7
sustainability.waste.compost-benefit=1.3

# Energy Factors
sustainability.energy.solar-bonus=1.2
sustainability.energy.wind-bonus=1.15
sustainability.energy.hydro-bonus=1.1
sustainability.energy.renewable-threshold=30

# Water Factors
sustainability.water.treatment-bonus=0.3
sustainability.water.compliance-threshold=80
sustainability.water.recycling-factor=0.4

# Certification Weights
sustainability.certification.gots-weight=1.3
sustainability.certification.oeko-tex-weight=1.2
sustainability.certification.bluesign-weight=1.25
sustainability.certification.c2c-weight=1.35
sustainability.certification.fair-trade-weight=1.15

# Social Impact Factors
sustainability.social.jobs-multiplier=1000
sustainability.social.community-base=5000
sustainability.social.fair-trade-multiplier=10

# Economic Factors
sustainability.economic.recycled-material-price=2.5
sustainability.economic.take-back-price=1.5
sustainability.economic.waste-disposal-cost=0.5

# ESG Weights
sustainability.esg.environmental-weight=0.4
sustainability.esg.social-weight=0.3
sustainability.esg.governance-weight=0.3

# Risk Thresholds
sustainability.risk.low-threshold=80
sustainability.risk.medium-threshold=60
sustainability.risk.high-threshold=40

# Validation Rules
sustainability.validation.max-recycling=100
sustainability.validation.max-energy=100
sustainability.validation.max-distance=5000
sustainability.validation.min-carbon-credit-long-distance=50
sustainability.validation.gots-min-recycled=70
sustainability.validation.renewable-energy-threshold=50
sustainability.validation.take-back-recycled-threshold=30
sustainability.validation.fair-trade-min-premium=100

# Report Generation
sustainability.report.company-name=EcoCut Solutions
sustainability.report.include-certifications=true
sustainability.report.default-format=pdf

# ==================== ML API Configuration ====================
ml.api.url=http://localhost:5000/predict
ml.api.timeout=30000
ml.api.retry-attempts=3
